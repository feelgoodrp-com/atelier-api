# Release flow for atelier-api.
#
# atelier-api is a SERVER, not a distributed binary — this workflow does not
# build artifacts. On a `v*` tag push it verifies the tag matches package.json,
# extracts the matching CHANGELOG section and publishes a GitHub Release (for
# history + the notes). Deployment is separate (redeploy on your host; on
# Dokploy, pushing `master` auto-redeploys).
#
# To cut a release: bump package.json `version`, add a CHANGELOG `## [x.y.z]`
# section, commit to master, then `git tag -a vx.y.z -m "…" && git push origin vx.y.z`.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve + verify version
        id: v
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG" ]; then
            echo "::error::Tag v$VERSION does not match package.json version $PKG"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog notes
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "See CHANGELOG.md for details." > notes.md
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          gh release create "v$VERSION" \
            --title "atelier-api v$VERSION" \
            --notes-file notes.md \
            --latest
